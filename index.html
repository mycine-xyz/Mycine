    <style>

        /* Updated Search Results for PC/Mobile */

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const API = '8fb914f298b90c2e92d9cec6a1c3b08f';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const BK = 'https://image.tmdb.org/t/p/w1280';
    let isSignUpMode = false; let currentId = ''; let currentType = ''; 
    let genreSwiper = null; 
    let vjsPlayer = videojs('my-vjs-player');

    window.addEventListener('popstate', function(event) {
        if (document.getElementById('player-page').style.display === 'block') {
            closePlayer(false);
        } else if (document.getElementById('movie-page').style.display === 'block') {
            closeMovie(false);
        } else if (!document.getElementById('home-page').classList.contains('active')) {
            switchPage('home-page', document.querySelector('.nav-item'), false);
        }
    });

    function toggleScreenMode() {
        const body = document.body;
        const icon = document.getElementById('toggle-icon');
        body.classList.toggle('pc-mode');
        icon.classList.toggle('fa-laptop');
        icon.classList.toggle('fa-mobile-screen');
        window.dispatchEvent(new Event('resize'));
    }

    function toggleAuthMode() { 
        isSignUpMode = !isSignUpMode; 
        document.getElementById('auth-title').innerText = isSignUpMode ? "Create Account" : "Login"; 
        document.getElementById('auth-email').style.display = isSignUpMode ? "block" : "none";
        document.getElementById('auth-main-btn').innerText = isSignUpMode ? "Sign Up" : "Login"; 
        document.getElementById('auth-toggle').innerHTML = isSignUpMode ? "Already have an account? <span>Login</span>" : "Don't have an account? <span>Sign Up</span>"; 
    }
    
    function handleAuth() { 
        const user = document.getElementById('auth-user').value.trim(); 
        const pass = document.getElementById('auth-pass').value.trim(); 
        if(!user || !pass) { alert("Please fill all fields!"); return; } 
        localStorage.setItem('mycine_logged_in', user); 
        showProfile(user); 
    }
    
    function showProfile(u) { 
        document.getElementById('auth-ui').style.display = 'none'; 
        document.getElementById('profile-ui').style.display = 'block'; 
        document.getElementById('locked-options').style.display = 'block'; 
        document.getElementById('user-display').innerText = u; 
    }

    function logout() { 
        localStorage.removeItem('mycine_logged_in'); 
        document.getElementById('auth-ui').style.display = 'block'; 
        document.getElementById('profile-ui').style.display = 'none'; 
        document.getElementById('locked-options').style.display = 'none'; 
    }

    function checkExistingLogin() { const u = localStorage.getItem('mycine_logged_in'); if(u) showProfile(u); }

    function switchPage(p, n, push = true) { 
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); 
        document.getElementById(p).classList.add('active'); 
        if(n) { 
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active')); 
            n.classList.add('active'); 
        } 
        if(push && p !== 'home-page') history.pushState({page: p}, "");
        window.scrollTo(0,0); 
    }
    
    async function searchMovies(q) { 
        if(q.length < 2) { document.getElementById('search-results').innerHTML = ''; return; } 
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API}&query=${q}`).then(r => r.json()); 
        
        document.getElementById('search-results').innerHTML = res.results.map(m => {
            if(!m.poster_path) return '';
            const title = m.title || m.name;
            const year = (m.release_date || m.first_air_date || 'N/A').split('-')[0];
            const type = m.media_type === 'movie' ? 'Movie' : 'Series';
            const rate = m.vote_average ? m.vote_average.toFixed(1) : 'N/A';
            
            return `
                <div class="search-item" onclick="openMovie(${m.id}, '${m.media_type}')">
                    <img src="${IMG}${m.poster_path}">
                    <div class="s-info">
                        <div class="s-name">${title}</div>
                        <div class="s-meta">
                            <span class="s-rate"><i class="fa-solid fa-star"></i> ${rate}</span>
                            <span>${type}</span>
                            <span>${year}</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right" style="color:#333"></i>
                </div>
            `;
        }).join(''); 
    }
    
    const genreData = [{ id: 28, name: "Action", icon: "fa-fire" }, { id: 35, name: "Comedy", icon: "fa-face-laugh-squint" }, { id: 27, name: "Horror", icon: "fa-ghost" }, { id: 878, name: "Sci-Fi", icon: "fa-rocket" }];

    async function init() {
        checkExistingLogin();
        const [trend, popular, rated] = await Promise.all([ 
            fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${API}`).then(r => r.json()), 
            fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API}`).then(r => r.json()),
            fetch(`https://api.themoviedb.org/3/movie/top_rated?api_key=${API}`).then(r => r.json()) 
        ]);

        trend.results.slice(0, 5).forEach(m => { const type = m.media_type || 'movie'; document.getElementById('hero-list').innerHTML += `<div class="swiper-slide h-slide" style="background-image:url('${BK}${m.backdrop_path}')"><div class="h-overlay"><h1 class="h-title">${m.title || m.name}</h1><div class="h-meta-hero">⭐ ${m.vote_average.toFixed(1)} • ${type.toUpperCase()}</div><p class="h-desc-hero">${m.overview}</p><div class="h-btns"><div class="btn-p-hero" onclick='openMovie(${m.id}, "${type}")'><i class="fa-solid fa-play"></i></div><div class="btn-info-hero" onclick='openMovie(${m.id}, "${type}")'><i class="fa-solid fa-circle-info"></i> More Info</div></div></div></div>`; });
        popular.results.slice(0, 10).forEach((m, i) => { document.getElementById('top10-list').innerHTML += `<div class="swiper-slide top10-card" onclick='openMovie(${m.id}, "movie")'><div class="top10-num">${i + 1}</div><img src="${IMG}${m.poster_path}" class="top10-img"></div>`; });
        trend.results.forEach(m => { document.getElementById('trending-list').innerHTML += `<div class="swiper-slide poster-card" onclick='openMovie(${m.id}, "${m.media_type || 'movie'}")'><img src="${IMG}${m.poster_path}"></div>`; });
        rated.results.forEach(m => { document.getElementById('top-rated-list').innerHTML += `<div class="swiper-slide poster-card" onclick='openMovie(${m.id}, "movie")'><img src="${IMG}${m.poster_path}"></div>`; });

        const chipBox = document.getElementById('genre-chips'); genreData.forEach((g, idx) => { const chip = document.createElement('div'); chip.className = `genre-chip ${idx === 0 ? 'active' : ''}`; chip.innerHTML = `<i class="fa-solid ${g.icon}"></i> ${g.name}`; chip.onclick = () => { document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active')); chip.classList.add('active'); loadGenreMovies(g.id); }; chipBox.appendChild(chip); });
        loadGenreMovies(genreData[0].id);
        new Swiper(".hero-swiper", { loop: true, autoplay: { delay: 4000 } }); 
        new Swiper(".top10-swiper", { slidesPerView: "auto", spaceBetween: 5 }); 
        new Swiper(".trend-swiper", { slidesPerView: "auto", spaceBetween: 15 });
        new Swiper(".rated-swiper", { slidesPerView: "auto", spaceBetween: 15 });
    }

    async function loadGenreMovies(gid) { 
        const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API}&with_genres=${gid}`).then(r => r.json()); 
        document.getElementById('genre-movie-list').innerHTML = res.results.map(m => `<div class="swiper-slide poster-card" onclick='openMovie(${m.id}, "movie")'><img src="${IMG}${m.poster_path}"></div>`).join(''); 
        if (genreSwiper) genreSwiper.destroy();
        genreSwiper = new Swiper(".genre-movies-swiper", { slidesPerView: "auto", spaceBetween: 15 });
    }

    async function openMovie(id, type, push = true) {
        currentId = id; currentType = type;
        const [det, cast] = await Promise.all([ fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API}`).then(r => r.json()), fetch(`https://api.themoviedb.org/3/${type}/${id}/credits?api_key=${API}`).then(r => r.json()) ]);
        document.getElementById('m-title').innerText = det.title || det.name; document.getElementById('m-desc').innerText = det.overview; document.getElementById('m-meta').innerText = `⭐ ${det.vote_average.toFixed(1)} • ${det.release_date || det.first_air_date}`; document.getElementById('m-bg-img').style.backgroundImage = `url('${BK}${det.backdrop_path}')`; document.getElementById('actor-list').innerHTML = cast.cast.slice(0, 5).map(c => `<div style="display:flex; align-items:center; background:var(--card); padding:10px; border-radius:12px; margin-bottom:8px;"><img src="${IMG}${c.profile_path}" style="width:40px; height:40px; border-radius:50%; margin-right:12px; object-fit:cover;">${c.name}</div>`).join('');
        document.getElementById('download-link').href = `https://www.google.com/search?q=download+${det.title || det.name}+movie`;
        
        const epSection = document.getElementById('ep-selector-section');
        if(type === 'tv') { 
            epSection.style.display = 'block'; 
            let sh = ''; 
            det.seasons.forEach(s => { 
                if(s.season_number > 0) {
                    sh += `<div class="season-btn ${s.season_number === 1 ? 'active' : ''}" onclick="changeSeason(this, ${id}, ${s.season_number})">${s.name}</div>`;
                }
            }); 
            document.getElementById('season-list').innerHTML = sh; 
            loadEpisodes(id, 1); 
        } 
        else { 
            epSection.style.display = 'none'; 
            document.getElementById('play-btn').onclick = () => openPlayer(type, id); 
        }
        document.getElementById('movie-page').style.display = 'block';
        if(push) history.pushState({modal: 'movie'}, "");
    }

    // New Function to handle Season Change with visual effect
    function changeSeason(btn, tid, sn) {
        document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadEpisodes(tid, sn);
    }

    async function loadEpisodes(tid, sn) { const res = await fetch(`https://api.themoviedb.org/3/tv/${tid}/season/${sn}?api_key=${API}`).then(r => r.json()); document.getElementById('episodes-grid').innerHTML = res.episodes.map(e => `<div class="ep-btn" onclick="openPlayer('tv', ${tid}, ${sn}, ${e.episode_number})">Ep ${e.episode_number}</div>`).join(''); document.getElementById('play-btn').onclick = () => openPlayer('tv', tid, sn, 1); }

    function openPlayer(t, id, s = 1, e = 1, push = true) { 
        document.getElementById('player-page').style.display = 'block';
        document.getElementById('my-vjs-player').style.display = 'none';
        document.getElementById('vidking-frame').style.display = 'block';
        const queryParams = `color=e11d48&autoplay=1`;
        let u = (t === 'movie') ? `https://player.videasy.net/movie/${id}?${queryParams}` : `https://player.videasy.net/tv/${id}/${s}/${e}?${queryParams}`;
        document.getElementById('vidking-frame').src = u;
        if(push) history.pushState({modal: 'player'}, "");
    }

    function closePlayer(pop = true) { 
        document.getElementById('player-page').style.display = 'none'; 
        document.getElementById('vidking-frame').src = ''; 
        vjsPlayer.pause(); 
        if(pop) history.back();
    }
    
    function closeMovie(pop = true) { 
        document.getElementById('movie-page').style.display = 'none'; 
        if(pop) history.back();
    }
    init();
</script>
